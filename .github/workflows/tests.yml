name: Advertisements API tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  HTTP_CLIENT.URL: https://qa-internship.avito.com
  HTTP_CLIENT.TIMEOUT: 100
  ALLURE_RESULTS_DIR: allure-results

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Запуск linter
        run: ruff check . --line-length=120

  smoke-tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements.txt

      - name: Запуск smoke тестов
        run: python -m pytest -m smoke --alluredir=allure-results --numprocesses 2

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results

  functional-tests:
    needs: smoke-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Запуск функциональных тестов
        run: python -m pytest -m functional --alluredir=allure-results --numprocesses 2
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-functional
          path: allure-results

  e2e-tests:
    needs: functional-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Запуск E2E тестов
        run: python -m pytest -m e2e --alluredir=allure-results --numprocesses 2
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e
          path: allure-results

  publish-report:
    needs: [smoke-tests, functional-tests, e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages

      - name: Загрузка всех результатов
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: all-results
          merge-multiple: true

      - name: Генерация Allure отчёта
        uses: simple-elf/allure-report-action@v1.13
        with:
          allure_results: all-results
          allure_history: allure-history

      - name: Деплой GH Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
